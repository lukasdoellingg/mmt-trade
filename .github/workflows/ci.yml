name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run build
        env:
          VITE_USE_SESSION_MUX: '1'
      - run: npm run audit:prod
      - run: node --test tests/regression/ws-safe.test.mjs
      - run: npm run test:regression
      - run: node scripts/verify-wasm-artifacts.mjs

  engine-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Odin
        run: |
          curl -fsSL https://odin-lang.org/install.sh | bash -s -- nightly
          echo "$HOME/.odin/bin" >> $GITHUB_PATH
      - name: Engine smoke build
        run: npm run build:engine:smoke
        env:
          SKIP_EMSCRIPTEN: '1'

  engine-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Odin
        run: |
          curl -fsSL https://odin-lang.org/install.sh | bash -s -- nightly
          echo "$HOME/.odin/bin" >> $GITHUB_PATH
      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git packages/engine/.emsdk
          cd packages/engine/.emsdk && ./emsdk install latest && ./emsdk activate latest
      - name: Chart runtime build
        run: npm run build:engine:chart
