name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify:
    name: pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:integration
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build:shell

  e2e:
    name: release e2e
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - run: npm run build:shell
      - run: npm run test:e2e

  build-wasm:
    name: build release wasm
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: cache emsdk
        id: emsdk-cache
        uses: actions/cache@v4
        with:
          path: packages/engine/.emsdk
          key: emsdk-3.1.74-${{ runner.os }}
      - name: install emsdk
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        run: bash packages/engine/scripts/install-emscripten.sh
      - name: install odin
        run: |
          sudo apt-get update
          sudo apt-get install -y odin || (
            git clone --depth 1 https://github.com/odin-lang/Odin.git /tmp/Odin
            cd /tmp/Odin && make release
            sudo cp odin /usr/local/bin/
          )
      - name: install vendor sources
        run: bash packages/engine/scripts/install-vendor.sh
      - name: build wasm artifacts
        run: |
          source packages/engine/.emsdk/emsdk_env.sh
          bash packages/engine/build.sh
          bash packages/engine/build.sh --smoke
      - name: upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-${{ github.ref_name }}
          path: |
            packages/shell/public/terminal.wasm
            packages/shell/public/terminal.js
            packages/shell/public/terminal_smoke.wasm
            packages/shell/public/terminal_smoke.js
          if-no-files-found: error

  github-release:
    name: publish GitHub release
    needs: [e2e, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: wasm-${{ github.ref_name }}
          path: release-artifacts
      - name: create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
