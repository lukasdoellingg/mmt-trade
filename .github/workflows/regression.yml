name: Regression

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-regression:
    name: JS smoke + regression + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:integration

  build-engine-full:
    name: full terminal wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: cache emsdk
        id: emsdk-cache
        uses: actions/cache@v4
        with:
          path: packages/engine/.emsdk
          key: emsdk-3.1.74-${{ runner.os }}
      - name: install emsdk
        if: steps.emsdk-cache.outputs.cache-hit != 'true'
        run: bash packages/engine/scripts/install-emscripten.sh
      - name: install odin
        run: |
          sudo apt-get update
          sudo apt-get install -y odin || (
            git clone --depth 1 https://github.com/odin-lang/Odin.git /tmp/Odin
            cd /tmp/Odin && make release
            sudo cp odin /usr/local/bin/
          )
      - name: install vendor sources
        run: bash packages/engine/scripts/install-vendor.sh
      - name: build full wasm
        run: |
          source packages/engine/.emsdk/emsdk_env.sh
          bash packages/engine/build.sh
      - name: enforce wasm size budget
        run: |
          wasm=packages/shell/public/terminal.wasm
          test -f "$wasm" || (echo "terminal.wasm missing"; exit 1)
          size=$(wc -c < "$wasm")
          echo "terminal.wasm size: $size B"
          [ "$size" -le 8388608 ] || (echo "terminal.wasm > 8 MB"; exit 1)

  test-cbor-odin:
    name: odin CBOR regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: install odin
        run: |
          sudo apt-get update
          sudo apt-get install -y odin || (
            git clone --depth 1 https://github.com/odin-lang/Odin.git /tmp/Odin
            cd /tmp/Odin && make release
            sudo cp odin /usr/local/bin/
          )
      - run: npm run test:cbor:odin

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - run: npm run build:shell
      - run: npm run test:e2e

  regression-success:
    name: regression gate
    needs: [full-regression, build-engine-full, test-cbor-odin, e2e]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Nightly / release regression passed."
