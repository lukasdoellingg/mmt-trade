name: Feature Request
description: Propose a new capability
title: '[feat]: '
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or system problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - P0 — blocks core workflow
        - P1 — important for parity
        - P2 — polish / nice-to-have
        - P3 — future / research
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: checkboxes
    id: backlog
    attributes:
      label: Backlog
      options:
        - label: I checked docs/BACKLOG.md for duplicates
          required: true
