name: Sprint Task
description: Backlog item for sprint planning
title: '[sprint]: '
labels: ['sprint']
body:
  - type: input
    id: sprint
    attributes:
      label: Sprint
      placeholder: sprint-01
    validations:
      required: true

  - type: input
    id: backlog-id
    attributes:
      label: Backlog ID
      placeholder: A9, B5, C2, …
    validations:
      required: true

  - type: input
    id: story-points
    attributes:
      label: Story points
      placeholder: '3'
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Task description
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (Definition of Done)
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Todo
        - In Progress
        - In Review
        - Done
        - Blocked
    validations:
      required: true
