name: Bug Report
description: Report a defect in MMT-Trade
title: '[bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues before filing. For security issues see [SECURITY.md](../SECURITY.md).

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - packages/engine (WASM terminal)
        - packages/shell (bootloader)
        - web/backend (API / WS proxy)
        - web/frontend (Vue workspace)
        - CI / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened vs. what you expected?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. npm run dev:legacy
        2. Open chart for BTC/USDT
        3. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 15
        Node: 20.x
        Browser: Chrome 136
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: I can reproduce on latest `develop`
          required: false
