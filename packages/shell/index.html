<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data: blob:; worker-src 'self' blob:; child-src 'self' blob:; base-uri 'self';"
    />
    <title>MMT-Trade Terminal</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #06060b;
        color: #e8e8f0;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #terminalCanvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #fpsOverlay {
        position: fixed;
        top: 8px;
        right: 10px;
        font: 11px Consolas, monospace;
        color: #6a7a8c;
        pointer-events: none;
        z-index: 10;
      }
      #loaderOverlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #06060b;
        color: #8889a8;
        font-size: 14px;
        pointer-events: none;
        transition: opacity 250ms ease;
      }
      #loaderOverlay.hidden {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="terminalCanvas" tabindex="0"></canvas>
    <div id="fpsOverlay"></div>
    <div id="loaderOverlay">Loading terminal.wasm…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
